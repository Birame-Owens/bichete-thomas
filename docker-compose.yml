services:
  backend:
    build:
      context: ./infra/docker/php
    container_name: bichette_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - bichette_network

  nginx:
    image: nginx:alpine
    container_name: bichette_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - bichette_network

  postgres:
    image: postgres:16-alpine
    container_name: bichette_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bichette-thomas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: poiuy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bichette_network

  redis:
    image: redis:alpine
    container_name: bichette_redis
    ports:
      - "6379:6379"
    networks:
      - bichette_network

  mailpit:
    image: axllent/mailpit
    container_name: bichette_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - bichette_network

volumes:
  postgres_data:

networks:
  bichette_network:
    driver: bridge