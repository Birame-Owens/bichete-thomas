<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Metadonnees principales
      Le title et la description sont les plus visibles : ils s affichent
      dans les onglets du navigateur, les resultats Google, et les apercus
      WhatsApp/Facebook quand quelqu un partage le lien du site.
    -->
    <title>Bichete Thomas — Salon de coiffure à Dakar</title>
    <meta name="description" content="Bichete Thomas, salon de coiffure à Dakar : tresses, locks, coiffures de cérémonie et soins capillaires. Réservez votre créneau en ligne et payez par Wave, Orange Money ou carte." />

    <!-- Couleur de la barre d adresse sur mobile (Chrome/Edge/Samsung Browser). -->
    <meta name="theme-color" content="#ffffff" />

    <!--
      Robots : autorise l indexation publique du site mais demande aux moteurs
      de ne pas garder de version en cache trop longtemps. Le fichier
      public/robots.txt prendra le relais pour les regles fines (cf A1).
    -->
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!--
      Open Graph (Facebook, WhatsApp, LinkedIn, Slack, Discord, etc.)
      Sans ces tags, un partage du lien affiche juste l URL nue. Avec, on
      obtient un apercu riche avec image + titre + description.
      A ajuster une fois l URL de prod et l image OG definitive disponibles.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bichete Thomas" />
    <meta property="og:title" content="Bichete Thomas — Salon de coiffure à Dakar" />
    <meta property="og:description" content="Réservez votre coiffure en ligne : tresses, locks, coiffures de cérémonie. Paiement Wave, Orange Money ou carte." />
    <meta property="og:locale" content="fr_FR" />
    <!-- A remplacer par l URL canonique en prod (ex: https://bichete-thomas.sn). -->
    <meta property="og:url" content="/" />
    <!-- A remplacer par une image 1200x630 dediee aux partages sociaux. -->
    <meta property="og:image" content="/logo-bichette.jpg" />

    <!-- Twitter Card : affichage carte au lieu de simple lien sur X/Twitter. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bichete Thomas — Salon de coiffure à Dakar" />
    <meta name="twitter:description" content="Réservez votre coiffure en ligne : tresses, locks, coiffures de cérémonie." />
    <meta name="twitter:image" content="/logo-bichette.jpg" />

    <link rel="icon" type="image/jpeg" href="/logo-bichette.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
