name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bichette_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: poiuy
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, mbstring, bcmath, gd, xml
          coverage: none

      - name: Validate composer configuration
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure CI environment
        run: |
          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_DEBUG=true
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=bichette_test
          DB_USERNAME=postgres
          DB_PASSWORD=poiuy
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF

      - name: Generate application key
        run: php artisan key:generate

      - name: Check PHP syntax
        run: find app routes database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Run tests
        run: php artisan test
