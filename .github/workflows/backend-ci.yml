name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Backend : tests d integration PHPUnit + Postgres + verification syntaxe
  # -------------------------------------------------------------------------
  backend:
    name: Backend (PHP 8.3 + Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bichette_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: poiuy
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, mbstring, bcmath, gd, xml
          coverage: none

      - name: Validate composer configuration
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure CI environment
        run: |
          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_DEBUG=true
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=bichette_test
          DB_USERNAME=postgres
          DB_PASSWORD=poiuy
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF

      - name: Generate application key
        run: php artisan key:generate

      - name: Check PHP syntax
        run: find app routes database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Run tests
        run: php artisan test

  # -------------------------------------------------------------------------
  # Frontend : type-check TypeScript + build production
  # -------------------------------------------------------------------------
  # On ne lance pas (encore) de tests Vitest dans cette etape : seul
  # client.helpers.ts a une suite, le reste est couvert par tsc + le build
  # qui valide les imports et la conformite des manualChunks (I10).
  # Ces deux verifications attrapent ~80% des bugs de PR frontend en
  # quelques secondes, sans le cout de maintenance de tests UI.
  frontend:
    name: Frontend (Node 20 - TypeScript + Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --project tsconfig.app.json --noEmit

      - name: Run unit tests (Vitest)
        run: npm test --if-present

      - name: Build production bundle
        run: npm run build
