services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_NAME: "Bichette Thomas"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://bichettethomas.site}
      APP_KEY: ${APP_KEY}
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: fr
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: warning
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bichette_thomas}
      DB_USERNAME: ${POSTGRES_USER:-bichette}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_CLIENT: ${REDIS_CLIENT:-predis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis
      SESSION_DOMAIN: ${SESSION_DOMAIN:-bichettethomas.site}
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: lax
      FRONTEND_URL: ${FRONTEND_URL:-https://bichettethomas.site}
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contact@bichettethomas.site}
      MAIL_FROM_NAME: "Bichette Thomas"
      NABOOPAY_BASE_URL: ${NABOOPAY_BASE_URL:-https://api.naboopay.com}
      NABOOPAY_API_KEY: ${NABOOPAY_API_KEY}
      NABOOPAY_WEBHOOK_SECRET: ${NABOOPAY_WEBHOOK_SECRET}
      NABOOPAY_SUCCESS_URL: ${NABOOPAY_SUCCESS_URL:-https://bichettethomas.site/client?paiement=naboopay_success}
      NABOOPAY_ERROR_URL: ${NABOOPAY_ERROR_URL:-https://bichettethomas.site/client?paiement=naboopay_cancel}
      NABOOPAY_FEES_CUSTOMER_SIDE: ${NABOOPAY_FEES_CUSTOMER_SIDE:-true}
      SEND_RECEIPT_WHATSAPP: ${SEND_RECEIPT_WHATSAPP:-false}
      SEND_RECEIPT_EMAIL: ${SEND_RECEIPT_EMAIL:-true}
      WHATSAPP_CLOUD_API_URL: ${WHATSAPP_CLOUD_API_URL:-https://graph.facebook.com/v25.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_RECEIPT_TEMPLATE_NAME: ${WHATSAPP_RECEIPT_TEMPLATE_NAME:-}
      WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE: ${WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE:-fr}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GERANTE_EMAIL: ${GERANTE_EMAIL}
      GERANTE_NAME: ${GERANTE_NAME:-Gerante}
      GERANTE_PASSWORD: ${GERANTE_PASSWORD}
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - postgres
      - redis

  # ── Workers de queue ────────────────────────────────────────────────────────
  # Deux workers pour absorber les pics : notifications WhatsApp, emails de
  # confirmation, reçus de paiement. Chacun tourne en processus isolé pour
  # éviter qu'un job bloquant gèle toute la file.
  queue:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile.prod
    restart: unless-stopped
    # --max-jobs 500 : recycle le worker après 500 jobs pour éviter les fuites mémoire.
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-jobs=500
    environment:
      APP_NAME: "Bichette Thomas"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://bichettethomas.site}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bichette_thomas}
      DB_USERNAME: ${POSTGRES_USER:-bichette}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_CLIENT: ${REDIS_CLIENT:-predis}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: warning
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contact@bichettethomas.site}
      MAIL_FROM_NAME: "Bichette Thomas"
      SEND_RECEIPT_WHATSAPP: ${SEND_RECEIPT_WHATSAPP:-false}
      SEND_RECEIPT_EMAIL: ${SEND_RECEIPT_EMAIL:-true}
      WHATSAPP_CLOUD_API_URL: ${WHATSAPP_CLOUD_API_URL:-https://graph.facebook.com/v25.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_RECEIPT_TEMPLATE_NAME: ${WHATSAPP_RECEIPT_TEMPLATE_NAME:-}
      WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE: ${WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE:-fr}
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - backend
      - redis
      - postgres

  queue-2:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile.prod
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-jobs=500
    environment:
      APP_NAME: "Bichette Thomas"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://bichettethomas.site}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bichette_thomas}
      DB_USERNAME: ${POSTGRES_USER:-bichette}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_CLIENT: ${REDIS_CLIENT:-predis}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: warning
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contact@bichettethomas.site}
      MAIL_FROM_NAME: "Bichette Thomas"
      SEND_RECEIPT_WHATSAPP: ${SEND_RECEIPT_WHATSAPP:-false}
      SEND_RECEIPT_EMAIL: ${SEND_RECEIPT_EMAIL:-true}
      WHATSAPP_CLOUD_API_URL: ${WHATSAPP_CLOUD_API_URL:-https://graph.facebook.com/v25.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_RECEIPT_TEMPLATE_NAME: ${WHATSAPP_RECEIPT_TEMPLATE_NAME:-}
      WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE: ${WHATSAPP_RECEIPT_TEMPLATE_LANGUAGE:-fr}
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - backend
      - redis
      - postgres

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - app_storage:/var/www/html/storage/app/public:ro
    depends_on:
      - backend

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  # Tuning adapté au CX23 (4 GB RAM).
  # shared_buffers     = 512 MB  → 25 % de la RAM (recommandation PostgreSQL)
  # effective_cache    = 1.5 GB  → estimation du cache disque OS + PostgreSQL
  # work_mem           = 10 MB   → mémoire par opération de tri/hash
  # maintenance_work   = 128 MB  → VACUUM, CREATE INDEX
  # max_connections    = 50      → suffisant (≤ 20 workers FPM + 2 queue)
  # random_page_cost   = 1.1     → SSD : coût seek ≈ coût séquentiel
  # wal_buffers        = 16 MB   → tampon WAL avant flush disque
  # checkpoint_target  = 0.9     → étale les écritures checkpoint sur 90 % du délai
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=10MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c random_page_cost=1.1
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=500
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bichette_thomas}
      POSTGRES_USER: ${POSTGRES_USER:-bichette}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis ────────────────────────────────────────────────────────────────────
  # maxmemory 256mb        → plafond strict pour éviter l'OOM killer
  # allkeys-lru            → expulse les clés les moins récentes si plein
  # save ""                → désactive les snapshots RDB (les données critiques
  #                          sont en PostgreSQL ; Redis ne sert qu'au cache,
  #                          sessions et queue → une perte au redémarrage est
  #                          acceptable et évite les I/O de flush périodique)
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  app_storage:
  app_logs:
