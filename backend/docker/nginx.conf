user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    # Le token de perf (~64 caractères) sert de clé dans la map $rl_key et dépasse
    # la taille de bucket par défaut (64) -> sans ça nginx refuse de démarrer
    # ("could not build map_hash, increase map_hash_bucket_size").
    map_hash_bucket_size 128;
    map_hash_max_size    2048;

    # Derrière le proxy Coolify/Traefik : récupérer la VRAIE IP client via
    # X-Forwarded-For. Sans ça, nginx voit tout le trafic comme venant de l'IP
    # du proxy -> le rate limit "par IP" devient un plafond GLOBAL pour tout le
    # site (un seul testeur ou un pic de trafic bloque alors tous les visiteurs).
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    # Plages Cloudflare : sans elles, nginx s'arrête sur l'IP du edge Cloudflare
    # au lieu du vrai client (https://www.cloudflare.com/ips/). À tenir à jour.
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Cache FastCGI — GET publics servis depuis RAM, PHP-FPM pas touché
    fastcgi_cache_path /tmp/nginx_fcgi_cache
        levels=1:2
        keys_zone=api_public:20m
        max_size=200m
        inactive=3m
        use_temp_path=off;

    # Décision de cache — WHITELIST : on ne cache QUE les routes publiques de
    # lecture, identiques pour tous les visiteurs. Tout le reste (panier, auth,
    # admin, checkout…) n'est jamais caché (privé par défaut). Les réponses de
    # ces routes ne portent plus de Set-Cookie (session découplée côté Laravel),
    # donc nginx peut les servir depuis la RAM sans réveiller PHP-FPM.
    # Plus besoin de tester le cookie de session ici (l'ancien check "ndeya_session"
    # ne correspondait même pas au vrai cookie "ndeya-shop-session").
    map $request_uri $is_public_cacheable {
        default                              0;
        "~^/api/client/home"                 1;
        "~^/api/client/featured-products"    1;
        "~^/api/client/new-arrivals"         1;
        "~^/api/client/products-on-sale"     1;
        "~^/api/client/categories-preview"   1;
        "~^/api/client/active-promotions"    1;
        "~^/api/client/shop-stats"           1;
        "~^/api/client/testimonials"         1;
        "~^/api/client/navigation"           1;
        "~^/api/client/products"             1;
        "~^/api/client/categories"           1;
        "~^/api/client/search"               1;
        "~^/api/client/delivery-zones"       1;
        "~^/api/client/config"               1;
    }

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml;

    # $rl_key est généré dans /etc/nginx/perf-token.conf au démarrage (start.sh)
    # à partir de PERFORMANCE_TEST_BYPASS_TOKEN : clé VIDE (= rate limit ignoré)
    # quand le bon token est envoyé dans X-Performance-Test-Token, sinon = vraie
    # IP client (limite normale par visiteur). Le secret n'est jamais dans le repo.
    include /etc/nginx/perf-token.conf;
    limit_req_zone $rl_key zone=api:10m    rate=180r/m;
    limit_req_zone $rl_key zone=auth:10m   rate=10r/m;
    limit_req_zone $rl_key zone=upload:10m rate=20r/m;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /dev/stdout main;

    server {
        listen 80;
        server_name _;

        root  /app/public;
        index index.php;

        add_header X-Frame-Options          "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options   "nosniff"                      always;
        add_header X-XSS-Protection         "1; mode=block"                always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 25M;

        location ~ ^/api/(admin/login|admin/logout|client/login|client/register|password) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            try_files $uri /index.php?$query_string;
        }

        location ~ ^/api/admin/produits {
            limit_req zone=upload burst=10 nodelay;
            limit_req_status 429;
            try_files $uri /index.php?$query_string;
        }

        location / {
            limit_req zone=api burst=60 nodelay;
            limit_req_status 429;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass            127.0.0.1:9000;
            fastcgi_index           index.php;
            fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include                 fastcgi_params;
            fastcgi_keep_conn       on;
            fastcgi_read_timeout    60;
            fastcgi_buffers         16 32k;
            fastcgi_buffer_size     32k;
            fastcgi_busy_buffers_size 64k;

            # Cache : uniquement les GET sur les routes publiques whitelistées.
            # skip=1 par défaut -> privé par défaut, on n'active le cache que
            # pour un GET ET une route publique connue.
            set $skip 1;
            if ($request_method = GET)    { set $skip 0; }
            if ($is_public_cacheable = 0) { set $skip 1; }

            # Laravel/Symfony renvoie "Cache-Control: no-cache, private" par défaut.
            # On l'ignore : notre whitelist $skip est la seule autorité de cache.
            # (Set-Cookie reste respecté -> jamais de réponse avec cookie en cache.)
            fastcgi_ignore_headers   Cache-Control Expires;

            fastcgi_cache            api_public;
            fastcgi_cache_key        "$request_method|$host|$request_uri";
            fastcgi_cache_valid       200 2m;
            fastcgi_cache_valid       404 30s;
            fastcgi_cache_bypass     $skip;
            fastcgi_no_cache         $skip;
            fastcgi_cache_lock       on;
            fastcgi_cache_lock_timeout 3s;
            # Servir l'ancien cache si PHP-FPM est surchargé (filet de sécurité).
            # NB: http_502/http_504 ne sont PAS des valeurs valides ici (nginx refuse
            # de démarrer) — uniquement http_500/http_503/http_403/http_404/http_429.
            fastcgi_cache_use_stale  error timeout updating http_500 http_503;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~* ^/storage/.*\.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires     30d;
            add_header  Cache-Control "public, no-transform";
            access_log  off;
        }

        location ~ /\. {
            deny all;
            return 404;
        }

        location ~* ^/storage/.*\.php$ {
            deny all;
            return 403;
        }
    }
}
