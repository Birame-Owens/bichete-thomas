; Pool PHP-FPM optimisé pour Hetzner CX23 (2 vCPU · 4 GB RAM)
;
; Calcul mémoire :
;   OS + Nginx        ~  350 MB
;   Redis             ~  256 MB
;   PostgreSQL        ~  700 MB (shared_buffers 512 MB + overhead)
;   Disponible FPM    ~ 2 700 MB
;   Taille par worker ~   80 MB (Laravel + OPcache chaud)
;   → max_children = 2700 / 80 ≈ 33, on utilise 28 (marge de sécurité).
;
;   Augmenté de 20 à 28 : le cache Redis sur /catalogue réduit drastiquement
;   la durée des workers (2ms vs 5s), donc plus de workers simultanés utiles.

[www]
user  = www-data
group = www-data

; Écoute sur le port TCP (même réseau Docker que nginx)
listen = 9000

; Mode dynamique : PHP-FPM crée/détruit des workers selon la charge.
pm                   = dynamic
pm.max_children      = 28
pm.start_servers     = 8
pm.min_spare_servers = 4
pm.max_spare_servers = 14

; Recycler les workers après 500 requêtes pour éviter les fuites mémoire.
pm.max_requests = 500

; Tuer les workers inactifs après 10 s pour libérer la RAM rapidement.
pm.process_idle_timeout = 10s

; Logger les requêtes lentes (> 3 s) sur stderr → visibles dans docker logs.
; Utile pour identifier les endpoints non optimisés en production.
slowlog                  = /proc/self/fd/2
request_slowlog_timeout  = 3s

; Variables d'environnement transmises aux workers
clear_env = no

; Statut FPM accessible depuis nginx (endpoint interne uniquement)
pm.status_path = /fpm-status
