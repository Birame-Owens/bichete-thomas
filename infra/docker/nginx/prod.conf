server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Taille max upload (images coiffures 4 MB + marge)
    client_max_body_size 20M;

    # ── Compression Gzip ──────────────────────────────────────────────────────
    # Cloudflare ajoute Brotli côté edge ; on gère Gzip côté origine pour les
    # requêtes qui contournent le CDN (health checks, tests de charge, etc.)
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── FastCGI buffers ───────────────────────────────────────────────────────
    # Laravel retourne des réponses JSON parfois volumineuses (catalogue complet).
    # Des buffers suffisants évitent que nginx aille écrire sur disque entre
    # chaque chunk renvoyé par PHP-FPM.
    fastcgi_buffer_size      32k;
    fastcgi_buffers          16 16k;
    fastcgi_busy_buffers_size 32k;

    # ── En-têtes de sécurité ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https://maps.google.com https://www.google.com; frame-ancestors 'none'; form-action 'self' https://checkout.naboopay.com; base-uri 'self'" always;

    # ── API → PHP-FPM ─────────────────────────────────────────────────────────
    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_pass           backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
        fastcgi_param HTTPS           on;
        fastcgi_read_timeout          120s;

        # Jamais mis en cache côté navigateur : toutes les réponses sont dynamiques
        add_header Cache-Control "no-store" always;
    }

    # ── Fichiers stockage (images uploadées) ──────────────────────────────────
    # Cloudflare met ces fichiers en cache avec son propre TTL.
    # stale-while-revalidate laisse nginx servir le fichier périmé pendant
    # que Cloudflare rafraîchit en arrière-plan → zéro latence perceptible.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header Vary           "Accept-Encoding" always;
    }

    # ── Assets Vite (JS/CSS avec hash de contenu) ─────────────────────────────
    # Vite ajoute un hash dans le nom de fichier → le contenu ne changera
    # jamais pour une URL donnée → on peut cacher indéfiniment (immutable).
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary           "Accept-Encoding"  always;
        access_log off;
    }

    # ── Images statiques (logo, hero, icônes, WebP uploadés) ─────────────────
    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
        add_header Vary           "Accept-Encoding" always;
        access_log off;
    }

    # ── SPA React (fallback) ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquer les fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
