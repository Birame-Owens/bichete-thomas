server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    # ----------------------------------------------------------------------
    # Headers de securite (B5)
    # ----------------------------------------------------------------------
    # Le flag "always" garantit que les headers sont aussi envoyes sur les
    # reponses d erreur (4xx/5xx) — sinon nginx ne les ajoute que sur 2xx/3xx.
    # En prod, TLS est termine en amont (Cloudflare/Caddy/Render/AWS ELB) :
    # ce nginx reste donc sur HTTP, mais les headers eux s appliquent partout.

    # Force HTTPS pendant 1 an y compris sous-domaines. A activer uniquement
    # quand le site est sur HTTPS pour de bon (sinon les navigateurs vont
    # refuser de revenir en HTTP meme en cas de probleme cert).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Empeche le navigateur de "deviner" le type MIME (anti type-sniffing
    # XSS sur les uploads).
    add_header X-Content-Type-Options "nosniff" always;

    # Anti-clickjacking : interdit l affichage du site dans une iframe.
    # Combine a frame-ancestors 'none' dans la CSP pour les vieux navigateurs.
    add_header X-Frame-Options "DENY" always;

    # Limite les infos envoyees dans le header Referer aux sites externes.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Desactive l acces aux APIs sensibles du navigateur (camera, micro, GPS)
    # — l app n en a pas besoin, autant fermer la porte.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy : la principale defense contre les XSS.
    # - script-src 'self' : interdit le inline et les scripts externes.
    #   Stripe Checkout et PayTech sont en redirect (pas Stripe.js), donc OK.
    # - style-src 'unsafe-inline' : necessaire pour Tailwind/lib React compiled.
    # - img-src https: : permet les photos de coiffures servies par n importe
    #   quel CDN HTTPS (au cas ou on migre vers S3/Cloudinary plus tard).
    # - connect-src 'self' : XHR uniquement vers la meme origine.
    #   /!\ A elargir avec l URL du backend si deploiement cross-domain.
    # - frame-ancestors 'none' : equivalent moderne de X-Frame-Options DENY.
    # - form-action : autorise les redirects vers les checkouts paiement.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.sentry.io; frame-src https://maps.google.com https://www.google.com; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com https://paytech.sn; base-uri 'self'" always;

    # ----------------------------------------------------------------------
    # Routing Laravel
    # ----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Bloque l acces aux fichiers .htaccess / .htpasswd (vestiges Apache).
    location ~ /\.ht {
        deny all;
    }
}
